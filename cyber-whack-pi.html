<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>赛博打地鼠 · CYBER WHACK</title>
<style>
  html,body{margin:0;padding:0;background:#04020f;}
  .cy-stage-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% -10%,#1b0b3a 0%,#0a0420 55%,#04020f 100%);padding:18px;box-sizing:border-box;font-family:"SF Mono",ui-monospace,Menlo,Consolas,"PingFang SC","Microsoft YaHei",monospace;}
  .cy-wrap{max-width:560px;width:100%;margin:0 auto;padding:22px;background:radial-gradient(circle at 20% 0%,rgba(40,18,90,.6) 0%,rgba(10,4,32,.6) 60%,rgba(4,2,15,.6) 100%);border-radius:20px;color:#e8e0ff;box-sizing:border-box;text-align:center;user-select:none;position:relative;overflow:hidden;border:1px solid #6a3bff;box-shadow:0 0 40px rgba(106,59,255,.3)}
  .cy-wrap::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(120,60,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(120,60,255,.08) 1px,transparent 1px);background-size:26px 26px;pointer-events:none}
  .cy-title{font-size:26px;font-weight:900;margin:0 0 2px;letter-spacing:4px;color:#fff;text-shadow:0 0 6px #ff2bd6,0 0 14px #ff2bd6,0 0 2px #fff;position:relative}
  .cy-sub{font-size:11px;color:#7be7ff;margin:0 0 16px;letter-spacing:1px;text-shadow:0 0 8px #00d4ff;position:relative}
  .cy-bar{display:flex;justify-content:space-between;gap:8px;margin-bottom:14px;position:relative;flex-wrap:wrap}
  .cy-stat{flex:1;min-width:80px;background:rgba(120,60,255,.1);border:1px solid #5b2bff;border-radius:10px;padding:7px 4px;box-shadow:0 0 10px rgba(120,60,255,.3) inset}
  .cy-stat .lab{font-size:9px;color:#9b8bff;letter-spacing:1px}
  .cy-stat .val{font-size:20px;font-weight:700;color:#fff;text-shadow:0 0 8px #00d4ff}
  .cy-stat .val small{font-size:10px;color:#9b8bff}
  .cy-prog{height:6px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden;margin-bottom:14px;position:relative}
  .cy-prog .fill{height:100%;width:100%;background:linear-gradient(90deg,#00ffd0,#7be7ff,#ff2bd6);transition:width 1s linear}
  .cy-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;position:relative}
  .cy-hole{aspect-ratio:1;background:radial-gradient(circle at 50% 75%,#241152,#0c0626);border:1px solid #4422aa;border-radius:12px;position:relative;overflow:visible;cursor:pointer;box-shadow:inset 0 -6px 12px rgba(0,0,0,.6),0 0 6px rgba(120,60,255,.2)}
  .cy-hole:hover{border-color:#7be7ff;box-shadow:inset 0 -6px 12px rgba(0,0,0,.6),0 0 12px rgba(123,231,255,.5)}
  .cy-inner{position:absolute;inset:0;border-radius:12px;overflow:hidden}
  .cy-mole{position:absolute;left:50%;bottom:-100%;transform:translateX(-50%);font-size:30px;transition:bottom .1s ease-out;pointer-events:none;filter:drop-shadow(0 0 6px #00d4ff)}
  .cy-hole.bomb .cy-mole{filter:drop-shadow(0 0 8px #ff2b5e)}
  .cy-hole.up .cy-mole{bottom:6%}
  .cy-float{position:absolute;left:50%;top:6px;transform:translateX(-50%);font-size:15px;font-weight:900;pointer-events:none;white-space:nowrap;background:linear-gradient(90deg,#ff2bd6,#ffae00,#3dff7b,#00d4ff,#9b5bff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 6px rgba(255,255,255,.4);animation:floatup .9s ease-out forwards;z-index:5}
  @keyframes floatup{0%{opacity:0;transform:translateX(-50%) translateY(6px) scale(.6)}20%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-34px) scale(1.1)}}
  .cy-ctrl{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:18px}
  .cy-btn{background:linear-gradient(90deg,#ff2bd6,#7b2bff);color:#fff;border:none;font-family:inherit;font-size:15px;font-weight:700;letter-spacing:2px;padding:13px 34px;border-radius:30px;cursor:pointer;transition:.15s;box-shadow:0 0 16px rgba(255,43,214,.6)}
  .cy-btn:hover{transform:scale(1.06);box-shadow:0 0 26px rgba(255,43,214,.9)}
  .cy-btn:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none}
  .cy-sound{background:rgba(120,60,255,.15);border:1px solid #5b2bff;color:#cfc4ff;font-family:inherit;font-size:16px;padding:11px 15px;border-radius:30px;cursor:pointer;transition:.15s}
  .cy-sound:hover{border-color:#7be7ff;color:#fff}
  .cy-sound.off{opacity:.45}
  .cy-msg{margin-top:12px;font-size:12px;color:#7be7ff;min-height:18px;letter-spacing:1px;text-shadow:0 0 8px #00d4ff;position:relative}
  .cy-stage-tag{font-size:10px;color:#ff9be8;letter-spacing:1px}
  .cy-result{margin-top:12px;display:none;gap:8px;justify-content:center;position:relative;flex-wrap:wrap}
  .cy-result.show{display:flex}
  .cy-result .rc{background:rgba(0,212,255,.1);border:1px solid #00a0c8;border-radius:10px;padding:6px 12px;font-size:11px;color:#9be9ff}
  .cy-result .rc b{display:block;font-size:18px;color:#fff;text-shadow:0 0 6px #00d4ff}
  .cy-credit{margin-top:14px;font-size:9px;color:#6a5fa0;letter-spacing:1px;position:relative}
  .cy-credit a{color:#9b8bff;text-decoration:none}
  .pop{animation:pop .3s}
  @keyframes pop{0%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.4)}100%{transform:translateX(-50%) scale(1)}}
  .flash .cy-inner{animation:flash .3s}
  @keyframes flash{0%,100%{box-shadow:inset 0 0 0 rgba(0,0,0,0)}50%{box-shadow:0 0 18px #ff2b5e,inset 0 0 18px #ff2b5e}}
</style>
</head>
<body>
<div class="cy-stage-wrap">
<div class="cy-wrap">
  <h2 class="cy-title">CYBER WHACK</h2>
  <p class="cy-sub">// 赛博打地鼠 5×5 · 120 秒 · 含音效 //</p>
  <div class="cy-bar">
    <div class="cy-stat"><div class="lab">SCORE</div><div class="val" id="cyScore">0</div></div>
    <div class="cy-stat"><div class="lab">TIME</div><div class="val" id="cyTime">120</div></div>
    <div class="cy-stat"><div class="lab">AVG 用时</div><div class="val" id="cyAvg">--<small>ms</small></div></div>
    <div class="cy-stat"><div class="lab">COMBO</div><div class="val" id="cyCombo">0</div></div>
    <div class="cy-stat"><div class="lab">BEST</div><div class="val" id="cyBest">0</div></div>
  </div>
  <div class="cy-prog"><div class="fill" id="cyFill"></div></div>
  <div class="cy-grid" id="cyGrid"></div>
  <div class="cy-ctrl">
    <button class="cy-btn" id="cyBtn">START</button>
    <button class="cy-sound" id="cySoundBtn" title="音效开关">🔊</button>
  </div>
  <div class="cy-msg" id="cyMsg">点击 START 进入网格</div>
  <div class="cy-result" id="cyResult"></div>
  <div class="cy-credit">Made by π</div>
</div>
</div>
<script>
(function(){
  var grid=document.getElementById('cyGrid'),scoreEl=document.getElementById('cyScore'),
      timeEl=document.getElementById('cyTime'),bestEl=document.getElementById('cyBest'),
      comboEl=document.getElementById('cyCombo'),avgEl=document.getElementById('cyAvg'),
      fill=document.getElementById('cyFill'),btn=document.getElementById('cyBtn'),
      msg=document.getElementById('cyMsg'),resultEl=document.getElementById('cyResult'),
      soundBtn=document.getElementById('cySoundBtn');
  var AC=window.AudioContext||window.webkitAudioContext,actx=null,soundOn=true;
  function ensureCtx(){if(!actx&&AC){actx=new AC();}if(actx&&actx.state==='suspended'){actx.resume();}}
  function hitSound(combo){
    if(!soundOn||!actx)return;var t=actx.currentTime;
    var o=actx.createOscillator(),g=actx.createGain();o.type='square';
    var base=720+Math.min(combo,12)*45;
    o.frequency.setValueAtTime(base,t);o.frequency.exponentialRampToValueAtTime(base*1.9,t+0.06);
    o.frequency.exponentialRampToValueAtTime(base*0.8,t+0.16);
    g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.22,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.18);
    o.connect(g).connect(actx.destination);o.start(t);o.stop(t+0.2);
    var o2=actx.createOscillator(),g2=actx.createGain();o2.type='sine';o2.frequency.setValueAtTime(base*2.5,t);
    g2.gain.setValueAtTime(0.0001,t);g2.gain.exponentialRampToValueAtTime(0.1,t+0.01);
    g2.gain.exponentialRampToValueAtTime(0.0001,t+0.1);
    o2.connect(g2).connect(actx.destination);o2.start(t);o2.stop(t+0.12);
  }
  function bombSound(){
    if(!soundOn||!actx)return;var t=actx.currentTime;
    var dur=0.4,buf=actx.createBuffer(1,actx.sampleRate*dur,actx.sampleRate),d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++){d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);}
    var src=actx.createBufferSource();src.buffer=buf;
    var flt=actx.createBiquadFilter();flt.type='lowpass';
    flt.frequency.setValueAtTime(1800,t);flt.frequency.exponentialRampToValueAtTime(150,t+0.35);
    var g=actx.createGain();g.gain.setValueAtTime(0.5,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.4);
    src.connect(flt).connect(g).connect(actx.destination);src.start(t);
    var o=actx.createOscillator(),og=actx.createGain();o.type='sawtooth';
    o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(40,t+0.35);
    og.gain.setValueAtTime(0.3,t);og.gain.exponentialRampToValueAtTime(0.0001,t+0.38);
    o.connect(og).connect(actx.destination);o.start(t);o.stop(t+0.4);
  }
  function startSound(){
    if(!soundOn||!actx)return;var t=actx.currentTime,notes=[440,660,880];
    notes.forEach(function(f,i){var o=actx.createOscillator(),g=actx.createGain();o.type='triangle';o.frequency.value=f;
      var st=t+i*0.08;g.gain.setValueAtTime(0.0001,st);g.gain.exponentialRampToValueAtTime(0.18,st+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,st+0.18);o.connect(g).connect(actx.destination);o.start(st);o.stop(st+0.2);});
  }
  soundBtn.addEventListener('click',function(){soundOn=!soundOn;ensureCtx();soundBtn.textContent=soundOn?'🔊':'🔇';soundBtn.classList.toggle('off',!soundOn);});
  var N=25,holes=[];
  for(var i=0;i<N;i++){
    var h=document.createElement('div');h.className='cy-hole';
    var inner=document.createElement('div');inner.className='cy-inner';
    var m=document.createElement('div');m.className='cy-mole';
    inner.appendChild(m);h.appendChild(inner);grid.appendChild(h);holes.push(h);
    (function(hole,mole){
      hole.addEventListener('click',function(){
        if(!running||!hole.classList.contains('up'))return;
        var rt=Date.now()-parseInt(hole.dataset.spawn||Date.now(),10);
        if(hole.dataset.bomb==='1'){
          score-=15;combo=0;comboEl.textContent=0;bombSound();
          hole.classList.add('flash');setTimeout(function(){hole.classList.remove('flash')},300);
          msg.innerHTML='&#128165; 病毒节点！-15 · <span class="cy-stage-tag">'+stageName+'</span>';
        }else{
          combo++;var gain=10+Math.min(combo,10);score+=gain;comboEl.textContent=combo;hitSound(combo);
          mole.classList.add('pop');setTimeout(function(){mole.classList.remove('pop')},300);
          reacts.push(rt);floatNum(hole,rt+'ms');updateAvg();
          msg.innerHTML='&#9889; +'+gain+(combo>2?' · 连击 x'+combo:'')+' · <span class="cy-stage-tag">'+stageName+'</span>';
        }
        retract(hole);if(score<0)score=0;scoreEl.textContent=score;
      });
    })(h,m);
  }
  function floatNum(hole,txt){var f=document.createElement('div');f.className='cy-float';f.textContent=txt;hole.appendChild(f);setTimeout(function(){f.remove()},900);}
  var running=false,score=0,time=120,best=0,combo=0,reacts=[],tickTimer,nextTimer,stageName='';
  function updateAvg(){if(!reacts.length){avgEl.innerHTML='--<small>ms</small>';return;}var s=0;for(var i=0;i<reacts.length;i++)s+=reacts[i];avgEl.innerHTML=Math.round(s/reacts.length)+'<small>ms</small>';}
  function curParams(){var e=120-time,base,maxUp;
    if(e<40){base=820-e*4;maxUp=2;stageName='STAGE 1 // 热身';}
    else if(e<80){base=660-(e-40)*4;maxUp=3;stageName='STAGE 2 // 加速';}
    else{base=500-(e-80)*2;maxUp=4;stageName='STAGE 3 // 过载';}
    return {spawn:Math.max(320,base),maxUp:maxUp};}
  function retract(hole){hole.classList.remove('up','bomb');hole.dataset.bomb='0';}
  function spawn(){
    var p=curParams();var upCount=0;for(var i=0;i<N;i++)if(holes[i].classList.contains('up'))upCount++;
    if(upCount<p.maxUp){
      var down=[];for(var j=0;j<N;j++)if(!holes[j].classList.contains('up'))down.push(holes[j]);
      if(down.length){
        var h=down[Math.floor(Math.random()*down.length)];
        var e=120-time;var bombRate=0.16+Math.min(0.16,e/120*0.16);var bomb=Math.random()<bombRate;
        h.dataset.bomb=bomb?'1':'0';h.dataset.spawn=Date.now();
        h.querySelector('.cy-mole').textContent=bomb?'☠️':'👾';
        if(bomb)h.classList.add('bomb');h.classList.add('up');
        var life=p.spawn*1.5;(function(hh){setTimeout(function(){if(hh.classList.contains('up'))retract(hh)},life)})(h);
      }
    }
    clearTimeout(nextTimer);nextTimer=setTimeout(spawn,p.spawn);
  }
  function start(){
    ensureCtx();startSound();running=true;score=0;time=120;combo=0;reacts=[];
    scoreEl.textContent=0;timeEl.textContent=120;comboEl.textContent=0;avgEl.innerHTML='--<small>ms</small>';
    fill.style.width='100%';resultEl.classList.remove('show');resultEl.innerHTML='';holes.forEach(retract);
    btn.disabled=true;btn.textContent='RUNNING';msg.innerHTML='系统启动 · <span class="cy-stage-tag">STAGE 1 // 热身</span>';
    spawn();tickTimer=setInterval(function(){time--;timeEl.textContent=time;fill.style.width=(time/120*100)+'%';if(time<=0)end();},1000);
  }
  function end(){
    running=false;clearInterval(tickTimer);clearTimeout(nextTimer);holes.forEach(retract);
    btn.disabled=false;btn.textContent='RESTART';if(score>best){best=score;bestEl.textContent=best;}
    if(reacts.length){
      var s=0,mn=Infinity,mx=0;for(var i=0;i<reacts.length;i++){s+=reacts[i];if(reacts[i]<mn)mn=reacts[i];if(reacts[i]>mx)mx=reacts[i];}
      var avg=Math.round(s/reacts.length);
      resultEl.innerHTML='<div class="rc">全局平均<b>'+avg+'ms</b></div><div class="rc">最快<b>'+mn+'ms</b></div><div class="rc">最慢<b>'+mx+'ms</b></div><div class="rc">命中<b>'+reacts.length+'</b></div>';
      resultEl.classList.add('show');msg.innerHTML='// 连接断开 · SCORE '+score+' · 平均反应 '+avg+'ms //';
    }else{msg.innerHTML='// 连接断开 · SCORE '+score+' //';}
  }
  btn.addEventListener('click',function(){if(!running)start();});
})();
</script>
</body>
</html>
